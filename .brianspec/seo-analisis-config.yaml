# Configuración de la skill immoral-seo-analisis-gsc para el Catálogo de Procesos
# Proyecto: immoralia.es/procesos (migrado de subdominio a subdirectorio el 08/07/2026)
# Skill: C:\Users\david\.claude\skills\immoralia\immoral-seo-analisis-gsc\SKILL.md

# La propiedad de GSC ahora es el dominio completo (immoralia.es), compartida
# con el blog (/blog). path_prefix acota los tools de análisis a las páginas
# del catálogo — sin esto, el informe mezclaría tráfico del blog. Ver
# gsc_top_queries/gsc_pages_with_low_ctr/gsc_indexed_count en el MCP.
site: https://immoralia.es/
path_prefix: /procesos

processes_file: src/data/processes.ts

sectors_mapping:
  salud: "Centros de Salud"
  gestorias: "Gestorías"
  centros-deportivos: "Centros Deportivos"
  construccion: "Construcción & Inmobiliaria"
  academias: "Academias / Formación"
  gastronomia-hosteleria: "Gastronomía y Hotelería"
  industrial: "Industrial"

report_destinations:
  - clickup_subpage

clickup:
  parent_page_id: knvz4-239855
  workspace_id: "20639716"
  page_title_prefix: "Informe SEO"

thresholds:
  position_drop_alert: 5       # Alertar si una query cae más de N posiciones
  ctr_low_alert: 0.005         # CTR < 0.5% con impresiones altas = alerta/oportunidad
  min_impressions_opportunity: 50   # Impresiones mínimas para aparecer en sección Oportunidades
  min_impressions_alert: 100   # Impresiones mínimas para disparar alerta de 0 clics
