name: 🤖 Preview URL en PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - staging

jobs:
  comment-preview-url:
    name: Comentar Preview de Vercel
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Esperar preview de Vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: waitForVercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 180
          check_interval: 10

      - name: Comentar URL en el PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vercel-preview
          message: |
            ## 🚀 Preview listo

            | | |
            |---|---|
            | **🔗 URL** | ${{ steps.waitForVercel.outputs.url }} |
            | **🌿 Rama** | `${{ github.ref_name }}` |
            | **📦 Commit** | `${{ github.sha }}` |

            > Revisa visualmente y haz merge cuando estés listo ✅
