name: Auto PR con descripcion

on:
  push:
    branches:
      - '**'

jobs:
  create-pr:
    name: Crear PR automatico
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: staging
          title: "Test PR automatico desde ${{ github.ref_name }}"
          body: "PR de prueba"
          draft: false
