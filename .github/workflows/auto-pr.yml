name: 🤖 Auto PR con descripción

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - staging

jobs:
  create-pr:
    name: Crear PR automático
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Leer descripción generada por antigravity
        id: pr_body
        run: |
          if [ -f ".github/PR_DESCRIPTION.md" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat .github/PR_DESCRIPTION.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=🤖 PR creado automáticamente desde antigravity." >> $GITHUB_OUTPUT
          fi

      - name: Crear PR si no existe
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: staging
          title: "[${{ github.ref_name }}] ${{ github.event.head_commit.message }}"
          body: ${{ steps.pr_body.outputs.body }}
          draft: false
          labels: antigravity, preview-pending

  comment-preview-url:
    name: Comentar Preview de Vercel
    runs-on: ubuntu-latest
    needs: create-pr
    permissions:
      pull-requests: write

    steps:
      - name: Esperar preview de Vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: waitForVercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 180
          check_interval: 10

      - name: Comentar URL en el PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vercel-preview
          message: |
            ## 🚀 Preview listo

            | | |
            |---|---|
            | **🔗 URL** | ${{ steps.waitForVercel.outputs.url }} |
            | **🌿 Rama** | `${{ github.ref_name }}` |
            | **📦 Commit** | `${{ github.sha }}` |

            > Revisa visualmente y haz merge cuando estés listo ✅
