name: Sync Supabase to Production

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  # Disparo manual desde Actions para verificar el pipeline sin esperar a un
  # merge staging→main (añadido tras el incidente del pipeline silencioso).
  workflow_dispatch:

jobs:
  sync-supabase:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'staging')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations on production
        id: migrations
        # set -o pipefail: sin esto, el `| tee` enmascara el exit code de
        # `supabase db push` y el job queda en verde aunque las migraciones
        # fallen (incidente 22/06-26/06: prod estuvo semanas sin migraciones).
        run: |
          set -o pipefail
          supabase link --project-ref "${{ secrets.SUPABASE_PROD_PROJECT_ID }}" \
            2>&1 | tee /tmp/migrations_output.txt
          supabase db push \
            2>&1 | tee -a /tmp/migrations_output.txt
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/migrations_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # El paso "Deploy Edge Functions" se eliminó (07/2026): las 5 functions de
      # supabase/functions/ son legacy del stack Vite — todas fueron portadas a
      # API routes de Next.js (src/app/api/*) y ya nada las invoca.

      - name: Setup Node.js for embeddings
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Extract knowledge base from production DB
        continue-on-error: true
        env:
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/extract_content.mjs --target=prod

      - name: Regenerate chatbot embeddings (production)
        continue-on-error: true
        env:
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate_embeddings.mjs --apply --target=prod

      - name: Create ClickUp documentation page
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          MIGRATIONS_OUTPUT: ${{ steps.migrations.outputs.output }}
          PR_NUMBER: ${{ github.event.pull_request.number || '0' }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Ejecución manual (workflow_dispatch)' }}
          PR_URL: ${{ github.event.pull_request.html_url || github.server_url }}
          AUTHOR: ${{ github.event.pull_request.user.login || github.actor }}
          MERGED_AT: ${{ github.event.pull_request.merged_at || github.event.repository.updated_at }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request
          from datetime import datetime

          token = os.environ["CLICKUP_TOKEN"]
          migrations = os.environ.get("MIGRATIONS_OUTPUT", "Sin cambios")
          pr_number = os.environ["PR_NUMBER"]
          pr_title = os.environ["PR_TITLE"]
          pr_url = os.environ["PR_URL"]
          author = os.environ["AUTHOR"]
          merged_at = os.environ["MERGED_AT"]

          try:
              dt = datetime.fromisoformat(merged_at.replace("Z", "+00:00"))
              fecha = dt.strftime("%d/%m/%Y %H:%M")
          except:
              fecha = merged_at

          content = "## Informacion del despliegue a Produccion\n\n"
          content += "**Fecha:** " + fecha + "\n"
          content += "**Autor:** " + author + "\n"
          content += "**Pull Request:** [#" + pr_number + " - " + pr_title + "](" + pr_url + ")\n\n"
          content += "---\n\n"
          content += "## Migraciones SQL aplicadas\n\n"
          content += "```\n" + migrations.strip() + "\n```\n\n"
          content += "---\n\n"
          content += "## Estado: Produccion sincronizada con Staging\n"

          payload = json.dumps({
              "name": "Deploy " + fecha + " - " + pr_title,
              "content": content,
              "content_format": "text/md",
              "parent_page_id": "knvz4-205635"
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.clickup.com/api/v3/workspaces/20639716/docs/knvz4-72275/pages",
              data=payload,
              headers={"Authorization": token, "Content-Type": "application/json"},
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as r:
                  print("Pagina creada en ClickUp:", r.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              print("Error ClickUp:", e.code, e.read().decode("utf-8"))
              exit(1)
          PYEOF
